<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini SCADA Industrial - Sensor Simulation</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main container industrial panel style */
        .scada-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(30, 40, 50, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(72, 187, 255, 0.3);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #2c4f6e;
        }

        h1 {
            color: #7ad0ff;
            text-shadow: 0 2px 5px #003366;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
            font-size: 1.8rem;
        }

        .badge {
            background: #0e2a36;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            color: #9cd4ff;
            font-family: monospace;
            font-weight: bold;
            border-left: 4px solid #2ecc71;
        }

        /* Sensor grid layout */
        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-bottom: 2rem;
        }

        /* Sensor card */
        .sensor-card {
            background: #1e2c38;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2f4d62;
        }

        .sensor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: #3e7b9c;
        }

        .sensor-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2f4f6b;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        .sensor-name {
            font-weight: bold;
            font-size: 1.3rem;
            color: #f0f9ff;
            letter-spacing: 0.5px;
        }

        .unit {
            background: #0b2b38;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #6fcbff;
            font-family: monospace;
        }

        .sensor-value {
            text-align: center;
            margin: 1rem 0;
        }

        .value-number {
            font-size: 3rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #dbecff;
            text-shadow: 0 0 8px #00a6ff;
            background: #0b1a22;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 1rem;
            letter-spacing: 2px;
        }

        .sensor-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            background: #15262e;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        .status-led {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: gray;
            box-shadow: 0 0 6px currentColor;
            transition: all 0.2s;
        }

        .status-led.normal {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .status-led.warning {
            background: #f39c12;
            box-shadow: 0 0 8px #f39c12;
        }

        .status-led.alarm {
            background: #e74c3c;
            box-shadow: 0 0 12px #e74c3c;
            animation: pulse 0.8s infinite;
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: bold;
        }

        .progress-bar {
            background: #0a1a22;
            border-radius: 20px;
            height: 8px;
            margin: 0.8rem 0;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.2s ease;
        }

        /* Control panel */
        .control-panel {
            background: #13232e;
            border-radius: 1.5rem;
            padding: 1.2rem 1.8rem;
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            border: 1px solid #2c6c8f;
        }

        .control-group {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: #2c4f6e;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px black;
        }

        button:hover {
            background: #3e7b9c;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .alarm-toggle {
            background: #8b3c2c;
        }
        .alarm-toggle.active {
            background: #e67e22;
            animation: pulseButton 1s infinite;
        }

        .sim-slider {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b202b;
            padding: 0.4rem 1rem;
            border-radius: 3rem;
        }

        input[type="range"] {
            width: 180px;
            cursor: pointer;
            background: #2b5e7a;
            height: 4px;
            border-radius: 5px;
        }

        .global-stats {
            font-family: monospace;
            background: #0c1820;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1);}
            50% { opacity: 0.5; transform: scale(1.2);}
            100% { opacity: 1; transform: scale(1);}
        }

        @keyframes pulseButton {
            0% { background: #e67e22; box-shadow: 0 0 0 0 #f39c12;}
            50% { background: #d35400; box-shadow: 0 0 0 5px rgba(243,156,18,0);}
            100% { background: #e67e22; box-shadow: 0 0 0 0 rgba(243,156,18,0);}
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 1.5rem;
            color: #6c8d9e;
        }
    </style>
</head>
<body>
<div class="scada-container">
    <div class="header">
        <h1>🏭 MINI SCADA · INDUSTRIAL MONITORING</h1>
        <div class="badge">🔹 REAL-TIME SIMULATION 🔹</div>
    </div>

    <!-- Sensor grid -->
    <div class="sensor-grid" id="sensorGrid"></div>

    <!-- Control panel -->
    <div class="control-panel">
        <div class="control-group">
            <div class="sim-slider">
                <span>⏩ Simulation Speed</span>
                <input type="range" id="simSpeed" min="100" max="2000" value="700" step="50">
                <span id="speedValue" style="min-width: 45px;">700ms</span>
            </div>
            <button id="resetBtn">🔄 Reset Values</button>
            <button id="randomBtn">🎲 Random Variation</button>
        </div>
        <div class="control-group">
            <button id="alarmBtn" class="alarm-toggle">🚨 FORCE GENERAL FAILURE</button>
        </div>
        <div class="global-stats" id="globalStatus">
            ✅ System OK
        </div>
    </div>
    <footer>
        Virtual sensors | Real-time simulated data | Configurable alarms
    </footer>
</div>

<script>
    // ---------- Sensor definitions ----------
    const sensoresData = [
        { id: "temp_reactor", nombre: "Reactor Temperature", unidad: "°C", min: 60, max: 180, valor: 120, trend: 0.5, fase: 0,
          alarmThresh: 155, warningThresh: 130, colorFill: "#e67e22" },
        { id: "presion_caldera", nombre: "Boiler Pressure", unidad: "psi", min: 10, max: 110, valor: 55, trend: 0.3, fase: 1.2,
          alarmThresh: 95, warningThresh: 75, colorFill: "#3498db" },
        { id: "nivel_tanque", nombre: "Tank Level", unidad: "%", min: 0, max: 100, valor: 68, trend: 0.8, fase: 2.5,
          alarmThresh: 92, warningThresh: 85, colorFill: "#2ecc71" },
        { id: "vibracion_motor", nombre: "Motor Vibration", unidad: "mm/s", min: 0, max: 25, valor: 8, trend: -0.2, fase: 0.9,
          alarmThresh: 20, warningThresh: 14, colorFill: "#f1c40f" },
        { id: "caudal_bomba", nombre: "Pump Flow", unidad: "L/min", min: 20, max: 220, valor: 115, trend: 0.6, fase: 3.0,
          alarmThresh: 190, warningThresh: 160, colorFill: "#9b59b6" },
        { id: "corriente_electrica", nombre: "Electric Current", unidad: "A", min: 5, max: 65, valor: 32, trend: -0.4, fase: 1.8,
          alarmThresh: 55, warningThresh: 45, colorFill: "#e74c3c" }
    ];

    let simInterval = null;
    let simSpeedMs = 700;
    let globalAlarmActive = false;
    
    // Realistic sensor value update
    function updateSensorRealistic(sensor) {
        if (globalAlarmActive) {
            // Failure mode: chaotic values
            let newVal = sensor.valor;
            if (sensor.id === "temp_reactor") 
                newVal = Math.min(sensor.max, sensor.valor + (Math.random() * 12 - 2));
            else if (sensor.id === "presion_caldera") 
                newVal = Math.min(sensor.max, sensor.valor + (Math.random() * 15 - 3));
            else if (sensor.id === "nivel_tanque") 
                newVal = Math.min(sensor.max, sensor.valor + (Math.random() * 18 - 5));
            else 
                newVal = sensor.valor * (0.8 + Math.random() * 0.9);
            
            return parseFloat(newVal.toFixed(1));
        } else {
            // Normal mode: realistic simulation
            let t = performance.now() / 1000;
            
            // Sine wave component (natural cycles)
            let sinVal = Math.sin(t * 0.2 + sensor.fase) * ((sensor.max - sensor.min) * 0.25);
            
            // Drift component (long-term changes)
            let drift = Math.sin(t * 0.05) * ((sensor.max - sensor.min) * 0.08);
            
            // Random noise (interference)
            let noise = (Math.random() - 0.5) * ((sensor.max - sensor.min) * 0.03);
            
            let midRange = (sensor.min + sensor.max) / 2;
            let rawVal = midRange + sinVal + drift + noise;
            rawVal += sensor.trend * 0.08;
            
            let newVal = Math.min(sensor.max, Math.max(sensor.min, rawVal));
            return parseFloat(newVal.toFixed(1));
        }
    }
    
    // Update all sensor values
    function refreshAllSensorValues() {
        for (let sens of sensoresData) {
            let newVal = updateSensorRealistic(sens);
            sens.valor = newVal;
        }
        renderSensorsUI();
        updateGlobalStats();
    }
    
    // Render UI
    function renderSensorsUI() {
        const grid = document.getElementById("sensorGrid");
        if (!grid) return;
        
        let html = "";
        for (let sens of sensoresData) {
            let estado = "normal";
            let estadoTexto = "✅ Normal";
            if (sens.valor >= sens.alarmThresh) {
                estado = "alarm";
                estadoTexto = "🔴 ALARM!";
            } else if (sens.valor >= sens.warningThresh) {
                estado = "warning";
                estadoTexto = "⚠️ Warning";
            }
            
            let percentage = ((sens.valor - sens.min) / (sens.max - sens.min)) * 100;
            percentage = Math.min(100, Math.max(0, percentage));
            
            let fillColor = sens.colorFill;
            if (estado === "alarm") fillColor = "#e74c3c";
            else if (estado === "warning") fillColor = "#f39c12";
            
            html += `
                <div class="sensor-card" data-id="${sens.id}">
                    <div class="sensor-title">
                        <span class="sensor-name">${sens.nombre}</span>
                        <span class="unit">${sens.unidad}</span>
                    </div>
                    <div class="sensor-value">
                        <span class="value-number">${sens.valor.toFixed(1)}</span>
                        <span style="font-size:1.2rem;"> ${sens.unidad}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%; background: ${fillColor};"></div>
                    </div>
                    <div class="sensor-status">
                        <div class="status-led ${estado}"></div>
                        <div class="status-text" style="color:${estado === 'alarm' ? '#ff8a7a' : (estado === 'warning' ? '#f7d44a' : '#b3f0c0')}">${estadoTexto}</div>
                        <div style="font-size:0.7rem;">Alarm Limit: ${sens.alarmThresh} ${sens.unidad}</div>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
    }
    
    // Global statistics and alarms
    function updateGlobalStats() {
        const globalDiv = document.getElementById("globalStatus");
        if (!globalDiv) return;
        let anyAlarm = sensoresData.some(s => s.valor >= s.alarmThresh);
        let anyWarning = sensoresData.some(s => s.valor >= s.warningThresh && s.valor < s.alarmThresh);
        
        if (globalAlarmActive) {
            globalDiv.innerHTML = "🚨 GENERAL FAILURE FORCED - UNSTABLE SYSTEM 🚨";
            globalDiv.style.background = "#5e2a2a";
            globalDiv.style.color = "#ff9e8f";
            globalDiv.style.animation = "pulse 0.8s infinite";
        } 
        else if (anyAlarm) {
            globalDiv.innerHTML = "⚠️ ACTIVE ALARM on one or more sensors ⚠️";
            globalDiv.style.background = "#7a3b2c";
            globalDiv.style.color = "#ffc2a1";
            globalDiv.style.animation = "pulse 0.8s infinite";
        }
        else if (anyWarning) {
            globalDiv.innerHTML = "⚡ Warning: Values outside optimal range ⚡";
            globalDiv.style.background = "#7a672a";
            globalDiv.style.color = "#ffefb9";
            globalDiv.style.animation = "none";
        }
        else {
            globalDiv.innerHTML = "✅ System operating normally | All parameters OK ✅";
            globalDiv.style.background = "#0c1820";
            globalDiv.style.color = "#9cd4ff";
            globalDiv.style.animation = "none";
        }
        
        const alarmBtn = document.getElementById("alarmBtn");
        if (alarmBtn) {
            if (globalAlarmActive) alarmBtn.classList.add("active");
            else alarmBtn.classList.remove("active");
        }
    }
    
    // Reset sensors to stable values
    function resetSensors() {
        for (let sens of sensoresData) {
            if (sens.id === "temp_reactor") sens.valor = 118;
            else if (sens.id === "presion_caldera") sens.valor = 54;
            else if (sens.id === "nivel_tanque") sens.valor = 65;
            else if (sens.id === "vibracion_motor") sens.valor = 7.5;
            else if (sens.id === "caudal_bomba") sens.valor = 110;
            else if (sens.id === "corriente_electrica") sens.valor = 30;
            else sens.valor = (sens.min + sens.max) / 2;
            
            sens.valor = parseFloat(Math.min(sens.max, Math.max(sens.min, sens.valor)).toFixed(1));
        }
        if (globalAlarmActive) {
            globalAlarmActive = false;
        }
        renderSensorsUI();
        updateGlobalStats();
    }
    
    // Random variation injection
    function randomVariation() {
        for (let sens of sensoresData) {
            let delta = (Math.random() - 0.5) * ((sens.max - sens.min) * 0.2);
            let newVal = sens.valor + delta;
            newVal = Math.min(sens.max, Math.max(sens.min, newVal));
            sens.valor = parseFloat(newVal.toFixed(1));
        }
        renderSensorsUI();
        updateGlobalStats();
    }
    
    // Toggle general failure mode
    function toggleGeneralAlarm() {
        globalAlarmActive = !globalAlarmActive;
        if (!globalAlarmActive) {
            for (let sens of sensoresData) {
                let target = (sens.min + sens.max) / 2;
                if (sens.id === "temp_reactor") target = 120;
                if (sens.id === "presion_caldera") target = 55;
                if (sens.id === "nivel_tanque") target = 68;
                sens.valor = sens.valor * 0.7 + target * 0.3;
                sens.valor = parseFloat(Math.min(sens.max, Math.max(sens.min, sens.valor)).toFixed(1));
            }
            renderSensorsUI();
        }
        updateGlobalStats();
    }
    
    // Start simulation timer
    function startSimulation() {
        if (simInterval) clearInterval(simInterval);
        simInterval = setInterval(() => {
            refreshAllSensorValues();
        }, simSpeedMs);
    }
    
    // Change simulation speed
    function changeSimSpeed() {
        const speedSlider = document.getElementById("simSpeed");
        const speedSpan = document.getElementById("speedValue");
        if (speedSlider) {
            simSpeedMs = parseInt(speedSlider.value);
            speedSpan.innerText = simSpeedMs + "ms";
            startSimulation();
        }
    }
    
    // Initialize everything
    document.addEventListener("DOMContentLoaded", () => {
        resetSensors();
        
        const speedSlider = document.getElementById("simSpeed");
        const resetBtn = document.getElementById("resetBtn");
        const randomBtn = document.getElementById("randomBtn");
        const alarmToggleBtn = document.getElementById("alarmBtn");
        
        if (speedSlider) speedSlider.addEventListener("input", changeSimSpeed);
        if (resetBtn) resetBtn.addEventListener("click", () => { resetSensors(); });
        if (randomBtn) randomBtn.addEventListener("click", () => { randomVariation(); });
        if (alarmToggleBtn) alarmToggleBtn.addEventListener("click", toggleGeneralAlarm);
        
        changeSimSpeed();
        startSimulation();
        
        renderSensorsUI();
        updateGlobalStats();
    });
    
    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        if (simInterval) clearInterval(simInterval);
    });
    
</script>
</body>
</html>
